version: 2

project_name: hurl-sync

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    binary: hurl-sync
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: hurl-sync
    description: "Sync hurl contract test files with OpenAPI/Swagger spec"
    homepage: "https://github.com/chamhaw/hurl-sync"
    license: "MIT"
    directory: Formula
    repository:
      owner: chamhaw
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    install: |
      bin.install "hurl-sync"
    test: |
      system "#{bin}/hurl-sync", "--help"
